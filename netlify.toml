[build]
  publish = "."
  command = ""

[functions]
  directory = "netlify/functions"

# ============================================
# CLEAN URLs (Remove .html extension)
# ============================================
# These redirects allow accessing pages without .html extension
# e.g., /add-martyr instead of /add-martyr.html

# Main pages - Clean URL redirects
[[redirects]]
  from = "/about"
  to = "/about.html"
  status = 200

[[redirects]]
  from = "/add-martyr"
  to = "/add-martyr.html"
  status = 200

[[redirects]]
  from = "/gallery"
  to = "/gallery.html"
  status = 200

[[redirects]]
  from = "/contact"
  to = "/contact.html"
  status = 200

[[redirects]]
  from = "/statistics"
  to = "/statistics.html"
  status = 200

[[redirects]]
  from = "/confirmation"
  to = "/confirmation.html"
  status = 200

# Admin pages - Clean URL redirects
[[redirects]]
  from = "/admin"
  to = "/admin.html"
  status = 200

[[redirects]]
  from = "/admin-login"
  to = "/admin-login.html"
  status = 200

# Redirect .html URLs to clean URLs (SEO - avoid duplicate content)
[[redirects]]
  from = "/about.html"
  to = "/about"
  status = 301
  force = true

[[redirects]]
  from = "/add-martyr.html"
  to = "/add-martyr"
  status = 301
  force = true

[[redirects]]
  from = "/gallery.html"
  to = "/gallery"
  status = 301
  force = true

[[redirects]]
  from = "/contact.html"
  to = "/contact"
  status = 301
  force = true

[[redirects]]
  from = "/statistics.html"
  to = "/statistics"
  status = 301
  force = true

[[redirects]]
  from = "/confirmation.html"
  to = "/confirmation"
  status = 301
  force = true

[[redirects]]
  from = "/admin.html"
  to = "/admin"
  status = 301
  force = true

[[redirects]]
  from = "/admin-login.html"
  to = "/admin-login"
  status = 301
  force = true

# ============================================
# API REDIRECTS
# ============================================
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

# Block access to debug files in production
[[redirects]]
  from = "/debug-*"
  to = "/index.html"
  status = 302
  force = true

[[redirects]]
  from = "/test-*.html"
  to = "/index.html"
  status = 302
  force = true

[[redirects]]
  from = "/login-debug.html"
  to = "/index.html"
  status = 302
  force = true

[[redirects]]
  from = "/simple-admin*.html"
  to = "/admin-login.html"
  status = 302
  force = true

[[redirects]]
  from = "/firebase-test.html"
  to = "/index.html"
  status = 302
  force = true

# ============================================
# SECURITY HEADERS
# ============================================

[[headers]]
  for = "/*"
  [headers.values]
    # Prevent clickjacking
    X-Frame-Options = "SAMEORIGIN"
    
    # Prevent MIME type sniffing
    X-Content-Type-Options = "nosniff"
    
    # Enable XSS protection (legacy browsers)
    X-XSS-Protection = "1; mode=block"
    
    # Referrer policy for privacy
    Referrer-Policy = "strict-origin-when-cross-origin"
    
    # HTTP Strict Transport Security (force HTTPS)
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    
    # Permissions policy (disable unnecessary features)
    Permissions-Policy = "geolocation=(), microphone=(), camera=(), payment=(), usb=(), magnetometer=(), gyroscope=(), accelerometer=()"
    
    # Content Security Policy - stricter but functional
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://www.gstatic.com https://cdnjs.cloudflare.com https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https:; connect-src 'self' https://*.googleapis.com https://*.firebaseio.com https://*.firebasestorage.app wss://*.firebaseio.com; frame-ancestors 'self'; base-uri 'self'; form-action 'self';"

# Strict headers for admin pages
[[headers]]
  for = "/admin*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Robots-Tag = "noindex, nofollow, noarchive"
    Cache-Control = "no-store, no-cache, must-revalidate, proxy-revalidate, private"
    Pragma = "no-cache"
    Expires = "0"

# Strict headers for API endpoints
[[headers]]
  for = "/api/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Cache-Control = "no-store, no-cache, must-revalidate"
    Content-Type = "application/json"

# Protect sensitive JS files
[[headers]]
  for = "/js/firebase-config.js"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

[[headers]]
  for = "/js/auth.js"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

[[headers]]
  for = "/js/admin.js"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

# Block access to debug files in production
[[headers]]
  for = "/debug-*"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

# Cache static assets
[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/*.png"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.svg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
